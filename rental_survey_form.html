
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { padding: 1.5rem 0; max-width: 520px; margin: 0 auto; }
.step { display: none; }
.step.active { display: block; }
.step-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 0.5rem; }
.step-sub { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.5rem; line-height: 1.6; }
.field { margin-bottom: 1.25rem; }
.field label { display: block; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; }
.field input { width: 100%; padding: 10px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 15px; }
.field input:focus { outline: none; border-color: #1D9E75; box-shadow: 0 0 0 2px #E1F5EE; }
.rental-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
.rental-card { border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 14px 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; background: var(--color-background-primary); transition: border-color 0.15s; }
.rental-card.selected { border-color: #1D9E75; background: #E1F5EE; }
.rental-card .check { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid var(--color-border-secondary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.rental-card.selected .check { background: #1D9E75; border-color: #1D9E75; }
.rental-card.selected .check::after { content: ''; display: block; width: 6px; height: 10px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); }
.rental-card .label { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.rental-card .desc { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 0.5rem; }
.btn { padding: 10px 20px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); font-size: 14px; cursor: pointer; }
.btn:hover { background: var(--color-background-secondary); }
.btn-primary { background: #1D9E75; color: #fff; border-color: #1D9E75; font-weight: 500; }
.btn-primary:hover { background: #0F6E56; border-color: #0F6E56; }
.btn-primary:disabled { background: var(--color-background-secondary); color: var(--color-text-tertiary); border-color: var(--color-border-tertiary); cursor: not-allowed; }
.progress { display: flex; gap: 6px; margin-bottom: 2rem; }
.prog-dot { height: 4px; flex: 1; border-radius: 99px; background: var(--color-border-tertiary); }
.prog-dot.done { background: #1D9E75; }
.prog-dot.active { background: #5DCAA5; }
.thanks { text-align: center; padding: 2rem 0; }
.thanks-icon { width: 56px; height: 56px; border-radius: 50%; background: #E1F5EE; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
.thanks-icon svg { width: 28px; height: 28px; }
.thanks h2 { font-size: 20px; font-weight: 500; margin-bottom: 0.5rem; }
.thanks p { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
.summary-box { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; text-align: left; margin-bottom: 1.5rem; }
.summary-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.summary-row:last-child { border-bottom: none; }
.summary-label { color: var(--color-text-secondary); }
.badge-sm { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 12px; background: #E1F5EE; color: #0F6E56; margin: 2px; }
.admin-btn { margin-top: 1rem; font-size: 13px; color: var(--color-text-secondary); text-align: center; cursor: pointer; text-decoration: underline; }
.admin-section { margin-top: 2rem; border-top: 0.5px solid var(--color-border-tertiary); padding-top: 1.5rem; display: none; }
.admin-section.open { display: block; }
.admin-title { font-size: 14px; font-weight: 500; margin-bottom: 1rem; color: var(--color-text-primary); }
.cat-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.cat-row:last-child { border-bottom: none; }
.cat-input { flex: 1; padding: 5px 8px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 13px; background: var(--color-background-primary); color: var(--color-text-primary); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-danger { color: #993C1D; border-color: #F0997B; }
.btn-danger:hover { background: #FAECE7; }
.records-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 1rem; }
.records-table th { padding: 7px 10px; text-align: left; font-weight: 500; color: var(--color-text-secondary); font-size: 12px; border-bottom: 0.5px solid var(--color-border-secondary); }
.records-table td { padding: 8px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); }
.err { color: #993C1D; font-size: 12px; margin-top: 4px; display: none; }
</style>

<div class="wrap">
  <h2 class="sr-only">レンタルアンケートフォーム</h2>

  <div id="survey">
    <div class="progress">
      <div class="prog-dot active" id="p0"></div>
      <div class="prog-dot" id="p1"></div>
      <div class="prog-dot" id="p2"></div>
    </div>

    <div class="step active" id="step0">
      <p class="step-title">お客様情報の入力</p>
      <p class="step-sub">お名前と電話番号をご入力ください。</p>
      <div class="field">
        <label>お名前</label>
        <input id="iName" placeholder="山田 太郎" oninput="validateStep0()">
        <div class="err" id="errName">お名前を入力してください</div>
      </div>
      <div class="field">
        <label>電話番号</label>
        <input id="iPhone" placeholder="090-0000-0000" oninput="validateStep0()">
        <div class="err" id="errPhone">電話番号を入力してください</div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="btn0" onclick="goStep(1)" disabled>次へ</button>
      </div>
    </div>

    <div class="step" id="step1">
      <p class="step-title">レンタル品の選択</p>
      <p class="step-sub">ご希望のレンタル品をすべてお選びください（複数選択可）。</p>
      <div class="rental-list" id="rentalList"></div>
      <div class="btn-row">
        <button class="btn" onclick="goStep(0)">戻る</button>
        <button class="btn btn-primary" onclick="goStep(2)">次へ</button>
      </div>
    </div>

    <div class="step" id="step2">
      <p class="step-title">内容の確認</p>
      <p class="step-sub">以下の内容でよろしいですか？</p>
      <div class="summary-box" id="summaryBox"></div>
      <div class="btn-row">
        <button class="btn" onclick="goStep(1)">戻る</button>
        <button class="btn btn-primary" onclick="submit()">送信する</button>
      </div>
    </div>
  </div>

  <div id="thanksScreen" style="display:none;">
    <div class="thanks">
      <div class="thanks-icon">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 14l6 6L23 8" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2>ありがとうございます！</h2>
      <p>アンケートの送信が完了しました。<br>スタッフがご準備いたします。</p>
      <button class="btn btn-primary" onclick="reset()">別のお客様を登録する</button>
    </div>

    <div class="admin-btn" onclick="toggleAdmin()">スタッフ用：登録一覧を見る</div>
    <div class="admin-section" id="adminSection">
      <div class="admin-title">レンタル項目の編集</div>
      <div id="catEditList"></div>
      <div style="display:flex;gap:8px;margin:10px 0 1rem;">
        <input class="cat-input" id="newCatName" placeholder="新しい項目名">
        <button class="btn btn-sm" onclick="addCat()">追加</button>
      </div>
      <div class="admin-title" style="margin-top:1rem;">登録済み一覧</div>
      <div style="overflow-x:auto;">
        <table class="records-table" id="recordsTable">
          <thead><tr id="recordsHead"></tr></thead>
          <tbody id="recordsBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
let categories = ['ウェア','シューズ','サングラス'];
let selected = {};
let records = [];

function renderRentalList() {
  const list = document.getElementById('rentalList');
  list.innerHTML = categories.map(c => `
    <div class="rental-card ${selected[c] ? 'selected' : ''}" onclick="toggleCat('${c}')">
      <div class="check"></div>
      <div><div class="label">${c}</div></div>
    </div>`).join('');
}

function toggleCat(c) {
  selected[c] = !selected[c];
  renderRentalList();
}

function goStep(n) {
  [0,1,2].forEach(i => {
    document.getElementById('step'+i).classList.toggle('active', i===n);
    const dot = document.getElementById('p'+i);
    dot.classList.remove('done','active');
    if (i < n) dot.classList.add('done');
    else if (i === n) dot.classList.add('active');
  });
  if (n === 2) renderSummary();
  if (n === 1) renderRentalList();
}

function validateStep0() {
  const name = document.getElementById('iName').value.trim();
  const phone = document.getElementById('iPhone').value.trim();
  document.getElementById('btn0').disabled = !(name && phone);
}

function renderSummary() {
  const name = document.getElementById('iName').value.trim();
  const phone = document.getElementById('iPhone').value.trim();
  const rentals = categories.filter(c => selected[c]);
  const box = document.getElementById('summaryBox');
  box.innerHTML = `
    <div class="summary-row"><span class="summary-label">お名前</span><span>${name}</span></div>
    <div class="summary-row"><span class="summary-label">電話番号</span><span>${phone}</span></div>
    <div class="summary-row"><span class="summary-label">レンタル品</span><span>${rentals.length ? rentals.map(r=>`<span class="badge-sm">${r}</span>`).join('') : '<span style="color:var(--color-text-secondary)">なし</span>'}</span></div>`;
}

function submit() {
  const name = document.getElementById('iName').value.trim();
  const phone = document.getElementById('iPhone').value.trim();
  const rentals = {};
  categories.forEach(c => { rentals[c] = !!selected[c]; });
  records.push({ name, phone, rentals, time: new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}) });
  document.getElementById('survey').style.display = 'none';
  document.getElementById('thanksScreen').style.display = 'block';
  renderRecordsTable();
}

function reset() {
  selected = {};
  document.getElementById('iName').value = '';
  document.getElementById('iPhone').value = '';
  document.getElementById('btn0').disabled = true;
  goStep(0);
  document.getElementById('survey').style.display = 'block';
  document.getElementById('thanksScreen').style.display = 'none';
  document.getElementById('adminSection').classList.remove('open');
}

function toggleAdmin() {
  document.getElementById('adminSection').classList.toggle('open');
  renderCatEdit();
  renderRecordsTable();
}

function renderCatEdit() {
  const el = document.getElementById('catEditList');
  el.innerHTML = categories.map((c,i) => `
    <div class="cat-row">
      <input class="cat-input" value="${c}" id="ci_${i}" onchange="categories[${i}]=this.value">
      <button class="btn btn-sm btn-danger" onclick="removeCat(${i})">削除</button>
    </div>`).join('');
}

function addCat() {
  const v = document.getElementById('newCatName').value.trim();
  if (!v) return;
  categories.push(v);
  document.getElementById('newCatName').value = '';
  renderCatEdit();
}

function removeCat(i) {
  categories.splice(i,1);
  renderCatEdit();
}

function renderRecordsTable() {
  const head = document.getElementById('recordsHead');
  const body = document.getElementById('recordsBody');
  const allCats = [...new Set(records.flatMap(r => Object.keys(r.rentals)))];
  head.innerHTML = `<th>時刻</th><th>名前</th><th>電話番号</th>${allCats.map(c=>`<th>${c}</th>`).join('')}`;
  body.innerHTML = records.map(r => `<tr>
    <td style="color:var(--color-text-secondary)">${r.time}</td>
    <td style="font-weight:500">${r.name}</td>
    <td>${r.phone}</td>
    ${allCats.map(c=>`<td>${r.rentals[c] ? '<span class="badge-sm">あり</span>' : ''}</td>`).join('')}
  </tr>`).join('');
}

renderRentalList();
</script>
